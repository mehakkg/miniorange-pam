:root {
  /* ---------- Background surfaces ---------- */
  --bg-marketing: #08090a;       /* page / marketing black */
  --bg-marketing-deep: #010102;  /* deepest flat canvas */
  --bg-panel: #0f1011;           /* sidebars, panels */
  --bg-surface: #191a1b;         /* cards, dropdowns */
  --bg-surface-2: #28282c;       /* hover / slightly elevated */

  /* ---------- Translucent surface stack (on dark) ---------- */
  --surface-00: rgba(255,255,255,0.02);
  --surface-01: rgba(255,255,255,0.03);
  --surface-02: rgba(255,255,255,0.04);
  --surface-03: rgba(255,255,255,0.05);
  --surface-04: rgba(255,255,255,0.08);

  /* ---------- Text / foreground ---------- */
  --fg-1: #f7f8f8;   /* primary text (near white) */
  --fg-2: #d0d6e0;   /* secondary / body */
  --fg-3: #8a8f98;   /* tertiary / muted */
  --fg-4: #62666d;   /* quaternary / disabled */
  --fg-on-accent: #ffffff;

  /* ---------- Brand & accent ---------- */
  --brand-indigo: #5e6ad2;       /* primary CTA background */
  --accent-violet: #7170ff;      /* interactive accent */
  --accent-hover: #828fff;       /* hover state */
  --security-lavender: #7a7fad;

  /* ---------- Status ---------- */
  --status-green: #27a644;
  --status-emerald: #10b981;

  /* ---------- Borders ---------- */
  --border-subtle: rgba(255,255,255,0.05);
  --border-standard: rgba(255,255,255,0.08);
  --border-solid-1: #23252a;
  --border-solid-2: #34343a;
  --border-solid-3: #3e3e44;
  --line-tint: #141516;
  --line-tertiary: #18191a;

  /* ---------- Light-mode neutrals (rare) ---------- */
  --light-bg: #f7f8f8;
  --light-surface: #f3f4f5;
  --light-surface-2: #f5f6f7;
  --light-border: #d0d6e0;
  --light-border-alt: #e6e6e6;
  --white: #ffffff;

  /* ---------- Overlay ---------- */
  --overlay-primary: rgba(0,0,0,0.85);

  /* ---------- Radii ---------- */
  --radius-micro: 2px;
  --radius-sm: 4px;
  --radius-md: 6px;
  --radius-card: 8px;
  --radius-panel: 12px;
  --radius-lg: 22px;
  --radius-pill: 9999px;
  --radius-circle: 50%;

  /* ---------- Spacing scale (8px base w/ optical micro-adj) ---------- */
  --space-1: 1px;
  --space-2: 4px;
  --space-3: 7px;   /* optical */
  --space-4: 8px;
  --space-5: 11px;  /* optical */
  --space-6: 12px;
  --space-7: 16px;
  --space-8: 19px;  /* optical */
  --space-9: 20px;
  --space-10: 22px;
  --space-11: 24px;
  --space-12: 28px;
  --space-13: 32px;
  --space-14: 35px;

  /* ---------- Shadows & elevation ---------- */
  --shadow-subtle: rgba(0,0,0,0.03) 0px 1.2px 0px 0px;
  --shadow-ring: rgba(0,0,0,0.2) 0px 0px 0px 1px;
  --shadow-inset: rgba(0,0,0,0.2) 0px 0px 12px 0px inset;
  --shadow-elevated: rgba(0,0,0,0.4) 0px 2px 4px;
  --shadow-focus: rgba(0,0,0,0.1) 0px 4px 12px;
  --shadow-dialog:
    rgba(0,0,0,0) 0px 8px 2px,
    rgba(0,0,0,0.01) 0px 5px 2px,
    rgba(0,0,0,0.04) 0px 3px 2px,
    rgba(0,0,0,0.07) 0px 1px 1px,
    rgba(0,0,0,0.08) 0px 0px 1px;

  /* ---------- Type: families ---------- */
  --font-sans: "Inter Variable", "Inter", "SF Pro Display",
               -apple-system, system-ui, "Segoe UI", Roboto,
               Oxygen, Ubuntu, Cantarell, "Open Sans",
               "Helvetica Neue", sans-serif;
  --font-mono: "Berkeley Mono", "JetBrains Mono",
               ui-monospace, "SF Mono", Menlo, monospace;

  --font-features: "cv01", "ss03";

  /* ---------- Type: role tokens (size / weight / line-height / tracking) ---------- */

:root {
  /* ---------- Light mode tokens (default) ---------- */
  --bg-app: #ffffff;
  --bg-canvas: #f7f8f9;
  --bg-panel: #ffffff;
  --bg-surface: #ffffff;
  --bg-surface-hover: #f3f4f6;
  --bg-surface-2: #f7f8f9;
  --bg-sidebar: #fbfbfc;
  --bg-overlay: rgba(15, 17, 20, 0.45);
  --bg-input: #ffffff;
  --bg-input-disabled: #f5f6f7;
  --bg-code: #f5f6f7;

  --fg-1: #0f1115;
  --fg-2: #2a2f37;
  --fg-3: #5b6470;
  --fg-4: #8a929d;
  --fg-5: #b5bac2;
  --fg-on-accent: #ffffff;

  --brand: #1f3bd2;          /* xecrify-style royal blue */
  --brand-hover: #1a32b3;
  --brand-pressed: #142c9c;
  --brand-soft: #e8edff;
  --brand-soft-2: #d4ddff;
  --brand-fg: #1f3bd2;
  --brand-ring: rgba(31, 59, 210, 0.16);

  --success: #15803d;
  --success-soft: #dcfce7;
  --success-fg: #166534;
  --warning: #b45309;
  --warning-soft: #fef3c7;
  --warning-fg: #92400e;
  --danger: #b91c1c;
  --danger-soft: #fee2e2;
  --danger-fg: #991b1b;
  --info: #1d4ed8;
  --info-soft: #dbeafe;
  --info-fg: #1e40af;

  --border: #e6e8eb;
  --border-strong: #d4d7dc;
  --border-subtle: #eef0f2;
  --border-focus: var(--brand);

  --shadow-xs: 0 1px 1px rgba(15, 17, 20, 0.04);
  --shadow-sm: 0 1px 2px rgba(15, 17, 20, 0.05), 0 1px 1px rgba(15, 17, 20, 0.03);
  --shadow-md: 0 4px 12px rgba(15, 17, 20, 0.06), 0 1px 2px rgba(15, 17, 20, 0.04);
  --shadow-lg: 0 12px 32px rgba(15, 17, 20, 0.10), 0 2px 6px rgba(15, 17, 20, 0.05);
  --shadow-focus: 0 0 0 3px var(--brand-ring);

  --radius-xs: 3px;
  --radius-sm: 4px;
  --radius-md: 6px;
  --radius-lg: 8px;
  --radius-xl: 10px;
  --radius-pill: 9999px;

  --space-1: 4px;
  --space-2: 8px;
  --space-3: 12px;
  --space-4: 16px;
  --space-5: 20px;
  --space-6: 24px;
  --space-7: 32px;
  --space-8: 40px;
  --space-9: 48px;
  --space-10: 64px;

  --font-sans: "Inter Variable", "Inter", -apple-system, "Segoe UI", Roboto, sans-serif;
  --font-mono: "JetBrains Mono", ui-monospace, "SF Mono", Menlo, monospace;
  --font-features: "cv01", "ss03";

  --sidebar-w: 240px;
  --sidebar-w-collapsed: 60px;
  --topbar-h: 56px;
}

[data-theme="dark"] {
  --bg-app: #0a0b0d;
  --bg-canvas: #0f1114;
  --bg-panel: #131519;
  --bg-surface: #16181d;
  --bg-surface-hover: #1c1f25;
  --bg-surface-2: #1a1d22;
  --bg-sidebar: #0d0f12;
  --bg-overlay: rgba(0, 0, 0, 0.7);
  --bg-input: #16181d;
  --bg-input-disabled: #131519;
  --bg-code: #16181d;

  --fg-1: #f5f6f8;
  --fg-2: #c8ccd2;
  --fg-3: #8a909a;
  --fg-4: #5f6571;
  --fg-5: #3d424b;

  --brand: #6b7eff;
  --brand-hover: #828fff;
  --brand-pressed: #5e6ad2;
  --brand-soft: rgba(107, 126, 255, 0.12);
  --brand-soft-2: rgba(107, 126, 255, 0.20);
  --brand-fg: #828fff;
  --brand-ring: rgba(107, 126, 255, 0.28);

  --success: #34d399;
  --success-soft: rgba(52, 211, 153, 0.12);
  --success-fg: #6ee7b7;
  --warning: #fbbf24;
  --warning-soft: rgba(251, 191, 36, 0.12);
  --warning-fg: #fcd34d;
  --danger: #f87171;
  --danger-soft: rgba(248, 113, 113, 0.12);
  --danger-fg: #fca5a5;
  --info: #60a5fa;
  --info-soft: rgba(96, 165, 250, 0.12);
  --info-fg: #93c5fd;

  --border: rgba(255, 255, 255, 0.08);
  --border-strong: rgba(255, 255, 255, 0.14);
  --border-subtle: rgba(255, 255, 255, 0.05);

  --shadow-xs: 0 1px 1px rgba(0, 0, 0, 0.3);
  --shadow-sm: 0 1px 2px rgba(0, 0, 0, 0.4);
  --shadow-md: 0 4px 12px rgba(0, 0, 0, 0.4);
  --shadow-lg: 0 12px 32px rgba(0, 0, 0, 0.5);
  --shadow-focus: 0 0 0 3px var(--brand-ring);
}

/* ============ Density ============ */
[data-density="compact"] {
  --space-2: 6px;
  --space-3: 10px;
  --space-4: 12px;
  --space-5: 16px;
  --space-6: 20px;
}

/* ============ Reset ============ */
* { box-sizing: border-box; font-feature-settings: var(--font-features); }
html, body {
  margin: 0;
  background: var(--bg-app);
  color: var(--fg-1);
  font-family: var(--font-sans);
  font-size: 14px;
  line-height: 1.5;
  -webkit-font-smoothing: antialiased;
  -moz-osx-font-smoothing: grayscale;
  text-rendering: optimizeLegibility;
}
button, input, select, textarea { font-family: inherit; font-feature-settings: var(--font-features); }
button { cursor: pointer; }
a { color: var(--brand-fg); text-decoration: none; }
a:hover { text-decoration: underline; }

/* ============ Type ============ */
.h-display { font-size: 32px; font-weight: 600; line-height: 1.15; letter-spacing: -0.5px; color: var(--fg-1); margin: 0; }
.h-title   { font-size: 22px; font-weight: 600; line-height: 1.25; letter-spacing: -0.3px; color: var(--fg-1); margin: 0; }
.h-section { font-size: 16px; font-weight: 600; line-height: 1.4;  letter-spacing: -0.1px; color: var(--fg-1); margin: 0; }
.h-card    { font-size: 14px; font-weight: 600; line-height: 1.4;  color: var(--fg-1); margin: 0; }
.t-body    { font-size: 14px; font-weight: 400; color: var(--fg-2); }
.t-small   { font-size: 13px; font-weight: 400; color: var(--fg-3); }
.t-tiny    { font-size: 12px; font-weight: 500; color: var(--fg-3); }
.t-micro   { font-size: 11px; font-weight: 500; color: var(--fg-4); text-transform: uppercase; letter-spacing: 0.5px; }
.t-mono    { font-family: var(--font-mono); font-size: 12px; }

/* ============ Buttons ============ */
.btn {
  display: inline-flex; align-items: center; justify-content: center; gap: 6px;
  height: 32px; padding: 0 12px;
  border: 1px solid var(--border); border-radius: var(--radius-md);
  background: var(--bg-surface); color: var(--fg-1);
  font: 500 13px/1 var(--font-sans);
  transition: background 120ms ease, border-color 120ms ease, color 120ms ease;
  white-space: nowrap;
}
.btn:hover { background: var(--bg-surface-hover); }
.btn:focus-visible { outline: none; box-shadow: var(--shadow-focus); border-color: var(--brand); }
.btn:disabled { opacity: 0.5; cursor: not-allowed; }

.btn-primary {
  background: var(--brand); color: #fff; border-color: var(--brand);
}
.btn-primary:hover { background: var(--brand-hover); border-color: var(--brand-hover); }
.btn-primary:active { background: var(--brand-pressed); }

.btn-ghost { background: transparent; border-color: transparent; color: var(--fg-2); }
.btn-ghost:hover { background: var(--bg-surface-hover); color: var(--fg-1); }

.btn-danger { color: var(--danger); border-color: var(--border); background: var(--bg-surface); }
.btn-danger:hover { background: var(--danger-soft); border-color: var(--danger); color: var(--danger); }

.btn-sm { height: 28px; padding: 0 10px; font-size: 12px; }
.btn-lg { height: 38px; padding: 0 16px; font-size: 14px; }
.btn-icon { width: 32px; padding: 0; }
.btn-icon.btn-sm { width: 28px; }

/* ============ Inputs ============ */
.field { display: flex; flex-direction: column; gap: 6px; }
.field-label {
  font: 500 13px/1.4 var(--font-sans);
  color: var(--fg-2);
  display: inline-flex; align-items: center; gap: 4px;
}
.field-label .req { color: var(--danger); }
.field-help { font: 400 12px/1.4 var(--font-sans); color: var(--fg-4); }
.field-error { font: 500 12px/1.4 var(--font-sans); color: var(--danger); display: flex; align-items: flex-start; gap: 6px; }

.input, .select, .textarea {
  width: 100%;
  background: var(--bg-input); color: var(--fg-1);
  border: 1px solid var(--border); border-radius: var(--radius-md);
  padding: 0 10px;
  height: 34px;
  font: 400 13px/1 var(--font-sans);
  transition: border-color 120ms ease, box-shadow 120ms ease;
}
.textarea { padding: 8px 10px; height: auto; min-height: 80px; line-height: 1.5; resize: vertical; }
.input::placeholder, .textarea::placeholder { color: var(--fg-4); }
.input:hover, .select:hover, .textarea:hover { border-color: var(--border-strong); }
.input:focus, .select:focus, .textarea:focus { outline: none; border-color: var(--brand); box-shadow: var(--shadow-focus); }
.input:disabled { background: var(--bg-input-disabled); color: var(--fg-4); }
.input.invalid, .select.invalid, .textarea.invalid { border-color: var(--danger); }
.input.invalid:focus { box-shadow: 0 0 0 3px rgba(185, 28, 28, 0.16); }

.input-prefix-wrap { display: flex; align-items: stretch; border: 1px solid var(--border); border-radius: var(--radius-md); background: var(--bg-input); transition: border-color 120ms; }
.input-prefix-wrap:focus-within { border-color: var(--brand); box-shadow: var(--shadow-focus); }
.input-prefix-wrap .prefix { display: inline-flex; align-items: center; padding: 0 10px; color: var(--fg-4); border-right: 1px solid var(--border); font: 500 12px/1 var(--font-mono); background: var(--bg-surface-2); }
.input-prefix-wrap .input { border: none; box-shadow: none !important; background: transparent; }

/* ============ Card / Panel ============ */
.card {
  background: var(--bg-panel);
  border: 1px solid var(--border);
  border-radius: var(--radius-lg);
}
.card-padded { padding: 20px; }
.card-header { padding: 16px 20px; border-bottom: 1px solid var(--border); display: flex; align-items: center; gap: 12px; }
.card-body { padding: 20px; }
.card-footer { padding: 12px 20px; border-top: 1px solid var(--border); display: flex; align-items: center; gap: 8px; }

/* ============ Badges / chips ============ */
.badge {
  display: inline-flex; align-items: center; gap: 4px;
  padding: 1px 7px;
  border-radius: var(--radius-sm);
  font: 500 11px/1.6 var(--font-sans);
  background: var(--bg-surface-2); color: var(--fg-2);
  border: 1px solid var(--border);
}
.badge-success { background: var(--success-soft); color: var(--success-fg); border-color: transparent; }
.badge-warning { background: var(--warning-soft); color: var(--warning-fg); border-color: transparent; }
.badge-danger  { background: var(--danger-soft); color: var(--danger-fg); border-color: transparent; }
.badge-info    { background: var(--info-soft); color: var(--info-fg); border-color: transparent; }
.badge-brand   { background: var(--brand-soft); color: var(--brand-fg); border-color: transparent; }

.dot { width: 6px; height: 6px; border-radius: 50%; background: var(--fg-4); display: inline-block; }
.dot-success { background: var(--success); }
.dot-warning { background: var(--warning); }
.dot-danger  { background: var(--danger); }
.dot-brand   { background: var(--brand); }

/* ============ Tables ============ */
.table { width: 100%; border-collapse: separate; border-spacing: 0; font-size: 13px; }
.table thead th {
  text-align: left; padding: 10px 16px;
  font: 500 11px/1 var(--font-sans);
  text-transform: uppercase; letter-spacing: 0.6px;
  color: var(--fg-4);
  background: var(--bg-surface-2);
  border-bottom: 1px solid var(--border);
  position: sticky; top: 0;
}
.table tbody td {
  padding: 12px 16px;
  border-bottom: 1px solid var(--border-subtle);
  color: var(--fg-2);
  vertical-align: middle;
}
.table tbody tr { transition: background 100ms ease; }
.table tbody tr:hover { background: var(--bg-surface-hover); }
.table tbody tr.selected { background: var(--brand-soft); }

/* ============ Misc utility ============ */
.divider { height: 1px; background: var(--border); margin: 16px 0; }
.row { display: flex; align-items: center; gap: 8px; }
.row-between { display: flex; align-items: center; justify-content: space-between; gap: 8px; }
.col { display: flex; flex-direction: column; gap: 8px; }
.spacer { flex: 1; }
.kbd {
  font: 500 11px/1 var(--font-mono);
  padding: 2px 5px; border-radius: 3px;
  background: var(--bg-surface-2); border: 1px solid var(--border);
  color: var(--fg-3);
}

.scroll-area { overflow: auto; }
.scroll-area::-webkit-scrollbar { width: 8px; height: 8px; }
.scroll-area::-webkit-scrollbar-thumb { background: var(--border-strong); border-radius: 4px; }
.scroll-area::-webkit-scrollbar-track { background: transparent; }

/* ============ Skeleton ============ */
.skel { background: linear-gradient(90deg, var(--bg-surface-2) 0%, var(--bg-surface-hover) 50%, var(--bg-surface-2) 100%); background-size: 200% 100%; animation: skel 1.4s linear infinite; border-radius: 4px; }
@keyframes skel { 0% { background-position: 200% 0; } 100% { background-position: -200% 0; } }

/* ============ Tooltip ============ */
.tooltip { position: relative; }
.tooltip[data-tip]:hover::after {
  content: attr(data-tip);
  position: absolute;
  bottom: calc(100% + 6px); left: 50%; transform: translateX(-50%);
  background: var(--fg-1); color: var(--bg-app);
  font: 500 11px/1.4 var(--font-sans);
  padding: 4px 8px; border-radius: 4px;
  white-space: nowrap; pointer-events: none;
  z-index: 100;
}

/* ============ Animations ============ */
@keyframes fadeIn { from { opacity: 0; transform: translateY(4px); } to { opacity: 1; transform: none; } }
.fade-in { animation: fadeIn 200ms ease-out; }

@keyframes spin { to { transform: rotate(360deg); } }
.spin { animation: spin 700ms linear infinite; }

@keyframes pulse-dot {
  0%, 100% { box-shadow: 0 0 0 0 rgba(31, 59, 210, 0.5); }
  50% { box-shadow: 0 0 0 6px rgba(31, 59, 210, 0); }
}
.pulse-dot { animation: pulse-dot 1.6s infinite; }
</style>
